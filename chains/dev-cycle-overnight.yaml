name: dev-cycle-overnight
description: Long-running variant of dev-cycle-with-review for unattended overnight runs. Loops until failure or Ctrl-C; pair with sst-chain-driver --max-budget-usd $X / --max-cycles N as the safety net. Randomized inter-iteration delay [300, 1800] (5-30min) keeps commit cadence human-shaped over many hours. The supervisor edits and commits skill improvements (proprietary AND sanitization-cleared transferable) directly within the run, so later iterations consume them. Designed to drain `TODO.md > Next up` while you sleep.
version: 1.3.0
user-invocable: true
loop: 0
loop-delay-random: [300, 1800]
skills:
  - sst-dev-cycle
  - sst-dev-review
